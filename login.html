<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitAI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>

    </style>
</head>
<body>
    <div class="card">
        <div class = "header">
            <p>Fit<span>AI</span> • STEP 1 OF 1</p>
            <h1>Tell us about yourself</h1>
            <p>We'll use this to build a personalized fitness plan for you.</p>
        </div>

        <form>

            <div class = "row">
                <div class="input-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" placeholder="Your name">
                </div>

                <div class="input-group">
                    <label for="age">Age</label>
                    <input type="text" id="age" placeholder="e.g. 19">
                </div>
            </div>

            <div class="row">
                <div class="input-group">
                    <label for="weight">Weight</label>
                    <input type="text" id="weight" placeholder="70">
                </div>

                <div class="input-group">
                    <label for="height">Height</label>
                    <input type="text" id="height" placeholder="170">
                </div>
            </div>

            <div class="selection-group">
                <p class="section-title">Activity Level</p>
                <div class="options-grid">
                    <label class="option-card">
                        <input type="radio" name="activity" value="light">
                        <span>Light</span>
                    </label>

                    <label class="option-card">
                        <input type="radio" name="activity" value="moderate">
                        <span>Moderate</span>
                    </label>

                    <label class="option-card">
                        <input type="radio" name="activity" value="active">
                        <span>Active</span>
                    </label>
                </div>
            </div>

            <div class="selection-group">
                <p class="section-title">Primary Goal</p>
                <div class="options-grid-2">
                    <label class="option-card">
                        <input type="radio" name="goal" value="lose_weight">
                        <span>🔥 Lose Weight</span>
                    </label>

                    <label class="option-card">
                        <input type="radio" name="goal" value="build_muscle">
                        <span>💪 Build Muscle</span>
                    </label>

                    <label class="option-card">
                        <input type="radio" name="goal" value="feel_better">
                        <span>🧘 Feel Better</span>
                    </label>

                    <label class="option-card">
                        <input type="radio" name="goal" value="performance">
                        <span>🏅 Performance</span>
                    </label>
                </div>
            </div>

            <button type="submit">Generate My Plan →</button>

        </form>
    </div>
</body>
</html>
